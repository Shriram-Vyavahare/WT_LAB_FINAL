<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Professional Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-tasks"></i>
                    <h1>Task Manager</h1>
                </div>
                <div class="header-stats">
                    <div class="stat-card">
                        <i class="fas fa-list-check"></i>
                        <div>
                            <span class="stat-label">Total Tasks</span>
                            <span class="stat-value" id="totalTasks">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div>
                            <span class="stat-label">Pending</span>
                            <span class="stat-value" id="pendingTasks">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <div>
                            <span class="stat-label">Completed</span>
                            <span class="stat-value" id="completedTasks">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Add Task Form -->
            <section class="add-task-section">
                <div class="section-header">
                    <h2><i class="fas fa-plus-circle"></i> Add New Task</h2>
                </div>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <label for="taskTitle">
                            <i class="fas fa-heading"></i> Task Title *
                        </label>
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="Enter task title..." 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">
                            <i class="fas fa-align-left"></i> Description
                        </label>
                        <textarea 
                            id="taskDescription" 
                            rows="3" 
                            placeholder="Enter task description (optional)..."
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </form>
            </section>

            <!-- Filter Tabs -->
            <section class="filter-section">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">
                        <i class="fas fa-list"></i> All Tasks
                    </button>
                    <button class="filter-tab" data-filter="pending">
                        <i class="fas fa-clock"></i> Pending
                    </button>
                    <button class="filter-tab" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
            </section>

            <!-- Tasks List -->
            <section class="tasks-section">
                <div class="section-header">
                    <h2><i class="fas fa-list-ul"></i> Tasks</h2>
                </div>
                <div id="tasksList" class="tasks-list">
                    <!-- Tasks will be dynamically loaded here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h3>No tasks found</h3>
                    <p>Add your first task to get started!</p>
                </div>
            </section>
        </main>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
