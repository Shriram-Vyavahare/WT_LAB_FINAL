<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Library Management System</h1>
            <p>Manage your book collection with ease</p>
        </header>

        <!-- Navigation Menu -->
        <nav class="navigation">
            <button id="showAddBookBtn" class="nav-btn active" onclick="showSection('add-book')">
                ➕ Add New Book
            </button>
            <button id="showAllBooksBtn" class="nav-btn" onclick="showSection('view-books')">
                📖 View All Books
            </button>
            <button id="showSearchBtn" class="nav-btn" onclick="showSection('search-book')">
                🔍 Search Books
            </button>
        </nav>

        <main>
            <!-- Add Book Section -->
            <section id="add-book-section" class="content-section active">
                <div class="section-card">
                    <h2>Add New Book to Library</h2>
                    <form id="addBookForm" class="book-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="title">📚 Book Title:</label>
                                <input type="text" id="title" name="title" placeholder="Enter book title" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="author">👤 Author:</label>
                                <input type="text" id="author" name="author" placeholder="Enter author name" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="year">📅 Publication Year:</label>
                                <input type="number" id="year" name="year" min="1000" max="2030" placeholder="e.g., 2023" required>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                ➕ Add Book to Library
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                🔄 Clear Form
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- View All Books Section -->
            <section id="view-books-section" class="content-section">
                <div class="section-card">
                    <div class="section-header">
                        <h2>📖 All Library Books</h2>
                        <div class="header-actions">
                            <button id="refreshBooks" class="btn btn-secondary">
                                🔄 Refresh List
                            </button>
                            <span id="bookCount" class="book-count">0 books</span>
                        </div>
                    </div>
                    
                    <div id="booksTableContainer" class="table-container">
                        <div class="loading">Loading books...</div>
                    </div>
                </div>
            </section>

            <!-- Search Books Section -->
            <section id="search-book-section" class="content-section">
                <div class="section-card">
                    <h2>🔍 Search Books</h2>
                    <div class="search-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="searchTitle">Search by Title:</label>
                                <input type="text" id="searchTitle" placeholder="Enter book title">
                            </div>
                            <div class="form-group">
                                <label for="searchAuthor">Search by Author:</label>
                                <input type="text" id="searchAuthor" placeholder="Enter author name">
                            </div>
                            <div class="form-group">
                                <label for="searchYear">Search by Year:</label>
                                <input type="number" id="searchYear" placeholder="Enter year">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button onclick="searchBooks()" class="btn btn-primary">
                                🔍 Search Books
                            </button>
                            <button onclick="clearSearch()" class="btn btn-secondary">
                                🗑️ Clear Search
                            </button>
                        </div>
                    </div>
                    
                    <div id="searchResults" class="table-container">
                        <div class="no-results">Enter search criteria and click "Search Books"</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Success/Error Messages -->
    <div id="messageContainer" class="message-container"></div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>🗑️ Confirm Delete</h3>
            <p id="deleteMessage">Are you sure you want to delete this book?</p>
            <div class="modal-actions">
                <button id="confirmDelete" class="btn btn-danger">Yes, Delete</button>
                <button id="cancelDelete" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
