<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Assignment 3</title>
</head>
<body>

    <h2>JavaScript Program for Array Sorting, Searching and Reversing</h2>

    <input type="text" placeholder="Enter element 1" class="inputele"><br>
    <input type="text" placeholder="Enter element 2" class="inputele"><br>
    <input type="text" placeholder="Enter element 3" class="inputele"><br>
    <input type="text" placeholder="Enter element 4" class="inputele"><br>
    <input type="text" placeholder="Enter element 5" class="inputele"><br>
    <input type="text" placeholder="Enter element 6" class="inputele"><br><br>

    <h3>Choose Sorting Method</h3>
    <input type="radio" name="sortType" value="bubble" checked> Bubble Sort
    <input type="radio" name="sortType" value="merge"> Merge Sort <br><br>

    <button type="button" id="processBtn">Sort Array</button><br><br>

    Sorted Array:
    <p id="sort"></p>

    <hr>

    <h3>Searching Using JavaScript</h3>
    <input type="text" id="searchKey" placeholder="Enter key to search">
    <button type="button" id="searchBtn">Search</button>
    <p id="searchResult"></p>

    <hr>

    <h3>Reversed Sorted Array</h3>
    <button type="button" id="reverseBtn">Reverse Array</button>
    <p id="reverse"></p>

    <script src="app.js"></script>
</body>
</html>
